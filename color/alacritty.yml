cursor:
  style: Block

colors:
  bright:
    black: '#414868'
    blue: '#7aa2f7'
    cyan: '#7dcfff'
    green: '#9ece6a'
    magenta: '#bb9af7'
    red: '#f7768e'
    white: '#c0caf5'
    yellow: '#e0af68'
  cursor:
    cursor: '#c0caf5'
    text: '#1d202f'
  normal:
    black: '#1d202f'
    blue: '#7aa2f7'
    cyan: '#7dcfff'
    green: '#9ece6a'
    magenta: '#bb9af7'
    red: '#f7768e'
    white: '#a9b1d6'
    yellow: '#e0af68'
  primary:
    background: '#24283b'
    foreground: '#c0caf5'
  selection:
    background: '#364a82'
    text: '#c0caf5'

font:
  size: 17
  offset:
    x: 0
    y: 0

  glyph_offset:
    x: 0
    y: 0

  normal:
    family: SauceCodePro Nerd Font Mono
    style:  Regular

    italic:
      family: SauceCodePro Nerd Font Mono
      style:  Italic

    bold:
      family: SauceCodePro Nerd Font Mono
      style:  Bold

    bold_italic:
      family: SauceCodePro Nerd Font Mono
      style:  "Bold Italic"


key_bindings:
  - { key: V,        mods: Alt,       action: Paste             }
  - { key: C,        mods: Alt,       action: Copy              }
  
  - { key: U,        mods: Alt,       action: ScrollLineUp              }
  - { key: D,        mods: Alt,       action: ScrollLineDown                }
  
  - { key: U,        mods: Alt|Control,       action: ScrollPageUp              }
  - { key: D,        mods: Alt|Control,       action: ScrollPageDown                }
  
  - { key: Up,        mods: Alt,       action: IncreaseFontSize              }
  - { key: Down,        mods: Alt,       action: DecreaseFontSize              }
  
  - { key: Q,        mods: Alt,       action: Quit              }
  - { key: M,        mods: Alt,       action: Minimize              }
  
  - { key: N,        mods: Alt,       action: CreateNewWindow              }
  - { key: V,        mods: Alt,       action: ToggleViMode              }
  
  - { key: F,        mods: Alt,       action: SearchForward              }
  - { key: F,        mods: Alt|Control,       action: SearchBackward              }
  
window:
  title: Alacritty
  dynamic_title: false
  dynamic_padding: false
  opacity: 0.9


  padding:
    x: 0
    y: 0

    startup_mode: Windowed
    opacity: 
      # shell:
      # program: powershell

